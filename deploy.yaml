apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: my-first-deploy
  name: my-first-deploy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: my-first-deploy
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: my-first-deploy
    spec:
      containers:
        - image: httpd:alpine3.18
          name: httpd
          command: ["/bin/bash", "-c"]  # overrides the defaut command
          args: ["sleep 5; exit 1"]     # exit with error after 5 seconds
  strategy:
    type: RollingUpdate                 # Recreate is also available
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
